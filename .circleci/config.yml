version: 2.1

orbs:
  sonarcloud: sonarsource/sonarcloud@2.0.0

jobs:
  build-and-test:
    docker:
      - image: cimg/node:18.17
      - image: mongo:6.0
        environment:
          MONGO_INITDB_DATABASE: paymentsportal_test
    environment:
      MONGO_URI_TEST: mongodb://localhost:27017/paymentsportal_test
      JWT_SECRET: test_jwt_secret_for_ci
      JWT_EMPLOYEE_SECRET: test_employee_jwt_secret_for_ci
      NODE_ENV: test
      EMPLOYEE_PASSWORD: Employee@123
    steps:
      - checkout

      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
            - v1-dependencies-

      - run:
          name: Install Server Dependencies
          command: npm install

      - save_cache:
          paths:
            - node_modules
          key: v1-dependencies-{{ checksum "package-lock.json" }}

      - run:
          name: Run Security Audit
          command: npm audit --audit-level=critical || true

      - run:
          name: Wait for MongoDB
          command: |
            for i in $(seq 1 15); do
              if nc -z localhost 27017; then
                echo "MongoDB is ready!"
                break
              fi
              echo "Waiting for MongoDB... attempt $i"
              sleep 3
            done

      - run:
          name: Run Tests with Coverage
          command: npm run test:ci

      - sonarcloud/scan:
          sonar_token_variable_name: SONAR_TOKEN

workflows:
  build-test-scan:
    jobs:
      - build-and-test:
          context: SonarCloud