version: 2.1

orbs:
  sonarcloud: sonarsource/sonarcloud@2.0.0
  node: circleci/node@5.1.0

jobs:
  build-and-test:
    docker:
      - image: cimg/node:18.17
    steps:
      - checkout

      - node/install-packages:
          pkg-manager: npm
          app-dir: .

      - node/install-packages:
          pkg-manager: npm
          app-dir: client

      - run:
          name: Run Security Audit
          command: npm audit --audit-level=high || true

      - run:
          name: Check for dependency vulnerabilities
          command: npm audit --json > audit-report.json || true

      - sonarcloud/scan

  sonarcloud-scan:
    docker:
      - image: cimg/node:18.17
    steps:
      - checkout
      - sonarcloud/scan

workflows:
  build-test-scan:
    jobs:
      - build-and-test:
          context: SonarCloud
      - sonarcloud-scan:
          context: SonarCloud
          requires:
            - build-and-test